name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']
        laravel-version: ['10.*', '11.*']
        dependency-version: [prefer-lowest, prefer-stable]
        include:
          - laravel-version: '10.*'
            testbench-version: '8.*'
          - laravel-version: '11.*'
            testbench-version: '9.*'
        exclude:
          # Floor versions of Laravel 10 (10.15) and Laravel 11 (11.0) both
          # pull in Symfony 6.x / 7.0, which predate PHP 8.4 and emit
          # "implicit-nullable param" deprecations that Laravel's bootstrap
          # converts to fatals before the test runner starts. Skip the
          # prefer-lowest legs on PHP 8.4 — floor coverage is still exercised
          # on PHP 8.3 (matches the package's `php: ^8.3` requirement), and
          # PHP 8.4 still gets prefer-stable coverage on both Laravel legs.
          - php-version: '8.4'
            dependency-version: prefer-lowest

    name: PHP ${{ matrix.php-version }} - Laravel ${{ matrix.laravel-version }} (${{ matrix.dependency-version }})

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache/files
        key: dependencies-laravel-${{ matrix.laravel-version }}-php-${{ matrix.php-version }}-${{ matrix.dependency-version }}-composer-${{ hashFiles('composer.json') }}
        restore-keys: |
          dependencies-laravel-${{ matrix.laravel-version }}-php-${{ matrix.php-version }}-${{ matrix.dependency-version }}-composer-
          dependencies-laravel-${{ matrix.laravel-version }}-php-${{ matrix.php-version }}-
          dependencies-laravel-${{ matrix.laravel-version }}-php-

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none
        tools: composer:v2

    - name: Setup problem matchers
      run: |
        echo "::add-matcher::${{ runner.tool_cache }}/php.json"
        echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

    - name: Pin Laravel & Testbench for this matrix leg
      run: |
        composer require --no-update \
          "laravel/framework:${{ matrix.laravel-version }}"
        composer require --no-update --dev \
          "orchestra/testbench:${{ matrix.testbench-version }}"

    - name: Install dependencies
      run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

    - name: List Installed Dependencies
      run: composer show -D

    - name: Execute tests
      run: composer test-all

  code-quality:
    runs-on: ubuntu-latest

    name: Code Quality

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none
        tools: composer:v2

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache/files
        key: dependencies-php-8.3-composer-${{ hashFiles('composer.json') }}
        restore-keys: |
          dependencies-php-8.3-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-interaction

    - name: Check code formatting with Laravel Pint
      run: composer lint
